<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PlanSwipe</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>

    <!-- ✅ LOGIN BOX (MISSING BEFORE — REQUIRED FOR YOUR APP.JS) -->
    <div id="loginBox" class="login-box">
      <h2>PlanSwipe</h2>
      <p>Σύνδεση / Είσοδος</p>

      <input id="nameInput" type="text" maxlength="24" placeholder="Το όνομά σου">

      <input id="groupInput" type="text" maxlength="30" placeholder="Όνομα ομάδας">

      <input id="codeInput" type="text" maxlength="8" placeholder="Κωδικός ομάδας">

      <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="createButton" type="button">Δημιουργία</button>
        <button id="joinButton" type="button">Συμμετοχή</button>
      </div>
    </div>

    <main class="app-shell">

      <!-- TOP BAR -->
      <section class="topbar" aria-label="App header">
        <div>
          <p class="eyebrow">Group plans</p>
          <h1>PlanSwipe</h1>
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
          <a href="previous.html" class="secondary-button" style="text-decoration:none;">
            Προηγούμενες Βόλτες
          </a>

          <button class="icon-button" id="resetButton" type="button">
            R
          </button>
        </div>
      </section>

      <!-- SETUP -->
      <section class="setup-panel is-hidden" id="setupPanel">
        <div>
          <h2>Δημιουργία ή συμμετοχή σε ομάδα</h2>
          <p>Συμφωνήστε με φίλους για το τι θα κάνετε.</p>
        </div>
      </section>

      <!-- GROUP HEADER -->
      <section class="group-panel is-hidden" id="groupPanel">
        <div>
          <p class="eyebrow">Τρέχουσα ομάδα</p>
          <h2 id="groupName">Παρέα</h2>
          <p>Κωδικός: <strong id="groupCode"></strong></p>
        </div>

        <div class="member-row" id="memberRow"></div>
      </section>

      <!-- STATUS -->
      <section class="status-panel is-hidden" id="statusPanel"></section>

      <!-- DECISION -->
      <section class="decision-panel is-hidden" id="decisionPanel">

        <div class="decision-header">
          <p id="decisionStep">Βήμα</p>
          <h2 id="decisionTitle"></h2>
          <p id="decisionHint"></p>
        </div>

        <div class="option-grid" id="optionGrid"></div>

      </section>

      <!-- SWIPE -->
      <section class="swipe-layout is-hidden" id="swipeLayout">

        <div class="search-summary" id="searchSummary"></div>

        <div class="activity-card" id="activityCard">
          <img id="activityPhoto" alt="">

          <div class="card-copy">
            <p id="activityCategory"></p>
            <h2 id="activityTitle"></h2>
            <p id="activityDescription"></p>

            <div>
              <span id="activityArea"></span>
              <span id="activityTime"></span>
              <span id="activityCost"></span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="noButton" type="button">✕</button>
          <button id="yesButton" type="button">✓</button>
        </div>

      </section>

      <!-- RESULTS -->
      <section class="results-panel is-hidden" id="resultsPanel">

        <div class="results-header">
          <h2>Αποτελέσματα</h2>

          <button id="reviewButton" type="button">
            Επανεξέταση
          </button>
        </div>

        <div class="result-list" id="resultList"></div>

      </section>

    </main>

    <!-- SCRIPT -->
    <script src="app.js"></script>

  </body>
</html>
