<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Προηγούμενες Βόλτες και Έξοδοι</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app-shell">

    <!-- Top bar -->
    <section class="topbar">
      <div>
        <p class="eyebrow">Ιστορικό</p>
        <h1>Προηγούμενες Βόλτες και Έξοδοι</h1>
      </div>

      <a href="index.html" class="secondary-button" style="text-decoration:none; display:flex; align-items:center;">
        Πίσω
      </a>
    </section>

    <!-- Content -->
    <section class="results-panel">

      <div class="results-header">
        <div>
          <p class="eyebrow">Activity history</p>
          <h2>Ολοκληρωμένες έξοδοι της ομάδας</h2>
        </div>
      </div>

      <div class="result-list">

        <!-- Example item -->
        <div class="result-card">
          <div class="result-icon"></div>

          <div>
            <h3>Psyrri meze spot</h3>
            <p>Center of Athens</p>
            <p>Δημήτρης, Μαρία, Κώστας</p>
            <p>12/06/2026</p>
          </div>

          <div class="result-score">
            Done
          </div>
        </div>

        <!-- Example item -->
        <div class="result-card">
          <div class="result-icon"></div>

          <div>
            <h3>Flisvos seaside walk</h3>
            <p>Athens seaside</p>
            <p>Δημήτρης, Άλεξ</p>
            <p>10/06/2026</p>
          </div>

          <div class="result-score">
            Done
          </div>
        </div>

      </div>

    </section>

  </main>
</body>
</html>
